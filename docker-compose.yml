services:
  freellmapi:
    image: 'ghcr.io/mohamed3nan/freellmapi:latest'
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST_BIND: 0.0.0.0
      ENCRYPTION_KEY: '${ENCRYPTION_KEY}'
      FREELLMAPI_CONTEXT_HANDOFF: '${FREELLMAPI_CONTEXT_HANDOFF}'
      REQUEST_ANALYTICS_RETENTION_DAYS: '${REQUEST_ANALYTICS_RETENTION_DAYS}'
      REQUEST_ANALYTICS_MAX_ROWS: '${REQUEST_ANALYTICS_MAX_ROWS}'
    ports:
      - '3002:3002'
    volumes:
      - 'freellmapi-data:/app/server/data'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "fetch('http://127.0.0.1:3002/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
volumes:
  freellmapi-data: null
